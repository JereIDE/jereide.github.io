<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JereIDE - The ready-to-use editor that nobody uses.</title>
        <link rel="icon" href="assets/AppIcon.png" type="image/png" />
        <link rel="stylesheet" href="styles.css" />
        <script defer src="script.js"></script>
    </head>
    <body>
        <img src="assets/AppIcon.png" alt="JereIDE Logo" class="logo" />

        </p>
        <div class="button-container">
            <a
                class="button-accent"
                href="https://github.com/JereIDE/JereIDE/releases"

                Star on GitHub
            </a>
        </div>
    </body>
</html>
